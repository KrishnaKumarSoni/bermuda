    <!-- Dashboard Page -->
    <div id="dashboardPage" class="hidden min-h-screen bg-gradient-to-br from-gray-50 to-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <!-- Dashboard Header -->
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8">

                    <h1 class="text-4xl font-black text-gray-900 mb-2">Your Forms</h1>
                    <p class="text-lg text-gray-600">Create and manage your conversational surveys</p>

                <button id="createFormBtn" class="inline-flex items-center px-6 py-3 text-lg font-semibold text-white bg-gradient-to-r from-primary-600 to-orange-600 rounded-2xl hover:from-primary-700 hover:to-orange-700 focus:outline-none focus:ring-4 focus:ring-primary-300 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">

            <div id="emptyState" class="text-center py-16 hidden">

                <button class="inline-flex items-center px-8 py-4 text-lg font-semibold text-white bg-gradient-to-r from-primary-600 to-orange-600 rounded-2xl hover:from-primary-700 hover:to-orange-700 focus:outline-none focus:ring-4 focus:ring-primary-300 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5" onclick="showCreateForm()">

                </button>
            </div>
        </div>
