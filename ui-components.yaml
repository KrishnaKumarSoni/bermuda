ui-components:
  overview: "This document defines all frontend UI components and styling for Bermuda using HTML/CSS/JS with Shadcn, tailored for a modern, vibrant, trending aesthetic. The design emphasizes flat, shadow-free elements with burnt orange accents for an engaging, forward-thinking vibe."

  tech-setup:
    framework: "Vanilla JS with Shadcn for reusable components (e.g., buttons, inputs, cards)"
    styling-library: "Tailwind CSS integrated with Shadcn for utility classes"
    color-palette:
      primary: "#CC5500"  # Burnt orange for accents, buttons, highlights
      secondary: "#FFDAB9"  # Soft peach for subtle backgrounds and hovers
      neutral: "#FFFFFF"  # White for main backgrounds
      text-primary: "#2C3E50"  # Dark slate for headings and body text
      text-secondary: "#7F8C8D"  # Muted gray for helper text
      error: "#E74C3C"  # Vibrant red for errors
      success: "#27AE60"  # Energetic green for toasts
    typography:
      headings: "Plus Jakarta Sans - Bold, sans-serif font for modern, geometric headings with a forward-thinking edge"
      body: "Inter Tight - Condensed sans-serif for clean, space-efficient body text with a trendy, minimalist feel"
      sizes:
        h1: "2.5rem (40px) for main titles, bold weight"
        h2: "1.875rem (30px) for section headers"
        body-large: "1.125rem (18px) for inputs and messages"
        body-small: "0.875rem (14px) for helper text and timestamps"
        line-height: "1.5 for body, 1.2 for headings to keep it tight and engaging"
    global-styles:
      backgrounds: "White base with burnt orange gradients for subtle vibrancy (e.g., linear-gradient from #FFFFFF to #FFDAB9)"
      borders: "Thin 1px solid #CC5500 borders for cards and inputs, rounded-md (0.375rem) for trendy softness"
      no-shadows: "Strictly flat design - no box-shadows or elevations; use color contrasts for depth"
      animations: "Subtle fade-ins (0.3s) for new elements; hover scales (1.05) with burnt orange transitions for engagement"
      responsiveness: "Mobile-first with breakpoints at 640px (sm), 768px (md), 1024px (lg); fluid typography scaling"

  core-components:
    button:
      variants:
        primary: "Burnt orange background (#CC5500), white text, rounded-md, padding 0.75rem 1.5rem; hover: brighten to #E07A00 with scale 1.05 transition"
        secondary: "White background with burnt orange border, burnt orange text; hover: fill with secondary peach (#FFDAB9)"
        disabled: "Grayed out (#CCCCCC) with cursor-not-allowed"
      typography: "Inter Tight, 1rem, uppercase for a modern, bold call-to-action feel"

    input-field:
      base: "White background, burnt orange border (1px solid #CC5500), rounded-md, padding 0.75rem; focus: border thickens to 2px with vibrant orange glow (no shadow)"
      placeholder: "Muted gray (#7F8C8D) in Inter Tight italic"
      validation: "Error state: Border changes to error red (#E74C3C) with inline red text below"
      textarea: "Auto-resizing height, min 6 rows for dump input, with subtle line numbers in peach for trendy detail"

    toggle-switch:
      design: "Shadcn-inspired slider: Burnt orange track when on, gray when off; circular handle with smooth 0.2s transition"
      label: "Plus Jakarta Sans bold next to switch for clear, modern labeling"

    card:
      base: "White background, thin burnt orange border, rounded-md, padding 1rem; flat with no shadows for contemporary minimalism"
      variants:
        question-card: "Stacked layout with heading (Plus Jakarta Sans) for question text, dropdown below in Inter Tight"
        form-list-card: "Horizontal layout with title on left, badges (response count in orange circle) on right"

    chat-bubble:
      design: "Rounded-lg bubbles; bot: Left-aligned, secondary peach background (#FFDAB9) with burnt orange text; user: Right-aligned, white background with dark slate text"
      typography: "Inter Tight for messages, small timestamp in muted gray below"
      animation: "Fade-in from bottom with 0.3s ease for vibrant, dynamic feel"

    modal:
      base: "Centered overlay with white background, burnt orange border, rounded-lg; close button as X in orange top-right"
      variants:
        preview-modal: "Full-width chat simulation with engaging orange header 'Preview Chat'"
        share-modal: "Compact with link input (copy button in burnt orange) and QR code in peach frame"

    toast-notification:
      design: "Bottom-right floating alerts; success: Green background with white text; error: Red with white; 3s auto-dismiss with slide-in animation"
      typography: "Inter Tight bold for message, no icons for clean, modern look"

    dashboard-list:
      design: "Grid layout (1 column mobile, 3 lg); each item as flat card with burnt orange hover border glow"
      badges: "Rounded-full orange badges for counts (e.g., '12 responses') with white text"

  modern-trendy-elements:
    gradients: "Subtle burnt orange to peach gradients on buttons and headers for vibrant, forward-thinking energy"
    icons: "Use simple SVG icons (e.g., copy icon in orange) from Heroicons for a clean, trending look"
    whitespace: "Generous padding (2rem sections) for breathable, modern layouts"
    dark-mode: "Not in MVP, but light theme optimized with high contrast for accessibility"
    custom-styling: "CSS overrides for Shadcn: Remove all shadows, tighten spacing for Inter Tight's condensed feel"