<!DOCTYPE html>
<html>
<head>
    <title>Form Routing Test</title>
</head>
<body>
    <h1>Form Routing Debug Test</h1>
    <div id="debug"></div>
    
    <script>
        const debug = document.getElementById('debug');
        
        function log(message) {
            debug.innerHTML += `<p>${message}</p>`;
            console.log(message);
        }
        
        log('Current URL: ' + window.location.href);
        log('Pathname: ' + window.location.pathname);
        log('Does pathname start with /form/: ' + window.location.pathname.startsWith('/form/'));
        
        if (window.location.pathname.startsWith('/form/')) {
            const formId = window.location.pathname.replace('/form/', '');
            log('Extracted form ID: ' + formId);
            
            // Test API call
            fetch(`/api/forms/${formId}`)
                .then(response => {
                    log('API response status: ' + response.status);
                    return response.text();
                })
                .then(text => {
                    log('API response: ' + text);
                })
                .catch(error => {
                    log('API error: ' + error);
                });
        }
    </script>
</body>
</html>
